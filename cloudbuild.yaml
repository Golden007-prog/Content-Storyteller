# ---------------------------------------------------------------------------
# cloudbuild.yaml — CI/CD pipeline for Content Storyteller
# ---------------------------------------------------------------------------
#
# Substitution variables:
#   _REGION       — GCP region (default: us-central1)
#   _AR_REPO      — Artifact Registry repository name (default: content-storyteller)
#   _TAG          — Image tag (default: latest; override with SHORT_SHA via trigger)
#
# Usage (manual submit):
#   gcloud builds submit --config cloudbuild.yaml --project=deep-hook-468814-t7
#
# Usage (trigger-based — SHORT_SHA is auto-populated):
#   Attach this config to a Cloud Build trigger on the main branch.

substitutions:
  _REGION: us-central1
  _AR_REPO: content-storyteller
  _TAG: latest

steps:
  # 1. Install dependencies
  - name: 'node:20-alpine'
    entrypoint: npm
    args: ['ci']
    id: install

  # 2. Build shared package (required before tests — other workspaces import from it)
  - name: 'node:20-alpine'
    entrypoint: npm
    args: ['run', 'build', '--workspace=packages/shared']
    id: build-shared
    waitFor: ['install']

  # 3. Build API Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - '.'
    id: build-api
    waitFor: ['build-shared']

  # 4. Build Worker Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/worker:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/worker:latest'
      - '-f'
      - 'apps/worker/Dockerfile'
      - '.'
    id: build-worker
    waitFor: ['build-shared']

  # 5. Push API image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api'
    id: push-api
    waitFor: ['build-api']

  # 6. Push Worker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/worker'
    id: push-worker
    waitFor: ['build-worker']

  # 7. Deploy API service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'api-service'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - 'api-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},UPLOADS_BUCKET=$PROJECT_ID-uploads,ASSETS_BUCKET=$PROJECT_ID-assets,FIRESTORE_DATABASE=(default),PUBSUB_TOPIC=content-generation-jobs,CORS_ORIGIN=https://golden007-prog.github.io,VERTEX_TEXT_MODEL=gemini-2.5-flash,VERTEX_TEXT_FALLBACK_MODEL=gemini-2.5-flash,VERTEX_REASONING_MODEL=gemini-2.5-pro,VERTEX_IMAGE_MODEL=gemini-2.5-flash,VERTEX_IMAGE_HQ_MODEL=gemini-2.5-pro,API_BASE_URL=https://api-service-828079020282.us-central1.run.app'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--max-instances'
      - '3'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '900'
      - '--quiet'
    id: deploy-api
    waitFor: ['push-api']

  # 8. Deploy Worker service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'worker-service'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/worker:latest'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - 'worker-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},UPLOADS_BUCKET=$PROJECT_ID-uploads,ASSETS_BUCKET=$PROJECT_ID-assets,TEMP_BUCKET=$PROJECT_ID-temp,FIRESTORE_DATABASE=(default),PUBSUB_SUBSCRIPTION=content-generation-jobs-sub,VERTEX_TEXT_MODEL=gemini-2.5-flash,VERTEX_TEXT_FALLBACK_MODEL=gemini-2.5-flash,VERTEX_REASONING_MODEL=gemini-2.5-pro,VERTEX_IMAGE_MODEL=gemini-2.5-flash,VERTEX_IMAGE_HQ_MODEL=gemini-2.5-pro,VERTEX_VIDEO_FAST_MODEL=veo-3.1-fast-generate-001,VERTEX_VIDEO_FINAL_MODEL=veo-3.1-generate-001,VERTEX_VIDEO_FAST_LOCATION=us-central1,VERTEX_VIDEO_FINAL_LOCATION=us-central1'
      - '--no-allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '4'
      - '--max-instances'
      - '3'
      - '--concurrency'
      - '1'
      - '--timeout'
      - '900'
      - '--quiet'
    id: deploy-worker
    waitFor: ['push-worker']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/worker:latest'

timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY
